[build]
  command = "npm ci --omit=dev && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.13.0"
  NPM_VERSION = "10.9.2"
  NPM_FLAGS = "--omit=dev"
  NODE_ENV = "production"
  VITE_ENABLE_AUTH = "true"
  VITE_DISABLE_GOOGLE_AUTH = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
